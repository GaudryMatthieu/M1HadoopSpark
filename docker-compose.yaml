services:
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    user: root # Nécessaire pour avoir les droits d'écriture sur le volume partagé
    ports:
      - "8080:8080" # UI Master
      - "7077:7077" # Communication Spark
      - "4040:4040" # UI Application
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./tp_projects:/opt/spark/work-dir # Dossier de travail officiel de l'image

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    user: root
    depends_on:
      - spark-master
    ports:
      - "8081:8081" # UI Worker
    # On indique au worker l'adresse du master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./tp_projects:/opt/spark/work-dir

  # Infrastructure de stockage: Data Lake
  namenode: 
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment :
      - CLUSTER_NAME=test
    ports:
      - "9870:9870" # UI NameNode
      - "9000:9000" # Communication HDFS
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment :
      - CLUSTER-PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9864:9864" # UI DataNode
      - "9866:9866" # Communication HDFS
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - namenode

volumes:
  hadoop_namenode:
  hadoop_datanode:

  networks:
    default:
      name: spark-network
      driver: bridge 